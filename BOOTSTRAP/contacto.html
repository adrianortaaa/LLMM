<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechNova - Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header-section { background: linear-gradient(45deg, #0d6efd, #0dcaf0); color: white; padding: 60px 0; }
        .form-card { border: none; border-radius: 20px; }
        .btn-gradient { background: linear-gradient(45deg, #0d6efd, #0dcaf0); border: none; color: white; }
        .btn-gradient:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body class="bg-light">

    <header class="header-section text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Contacta con Soporte</h1>
            <p class="lead">Estamos aquí para resolver tus dudas técnicas.</p>
        </div>
    </header>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card form-card shadow-lg p-4 p-md-5">
                    <form>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nombre</label>
                                <input type="text" class="form-control" placeholder="Tu nombre">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" placeholder="tu@email.com">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Asunto</label>
                            <select class="form-select">
                                <option>Soporte Técnico</option>
                                <option>Ventas al por mayor</option>
                                <option>Prensa</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mensaje</label>
                            <textarea class="form-control" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                        </div>
                        <button type="button" class="btn btn-gradient btn-lg w-100">Enviar Mensaje</button>
                    </form>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted">← Volver a la página principal</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
